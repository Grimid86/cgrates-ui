apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: operator-gateway-hpa
  namespace: billing-operator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: operator-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: operator-ui-hpa
  namespace: billing-operator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: operator-ui
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
