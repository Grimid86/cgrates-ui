apiVersion: v1
kind: Service
metadata:
  name: operator-gateway
  namespace: billing-operator
spec:
  type: ClusterIP
  selector:
    app: operator-gateway
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: operator-ui
  namespace: billing-operator
spec:
  type: ClusterIP
  selector:
    app: operator-ui
  ports:
  - port: 80
    targetPort: 80
    name: http
