apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: operator-deny-cross-portal
  namespace: billing-operator
spec:
  podSelector:
    matchLabels:
      app: operator-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: billing-operator
      podSelector:
        matchLabels:
          app: operator-ui
    ports:
    - protocol: TCP
      port: 8080
