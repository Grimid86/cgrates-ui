apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: selfcare-gateway-hpa
  namespace: billing-selfcare
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: selfcare-gateway
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_request_duration_seconds
      target:
        type: AverageValue
        averageValue: "0.2"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: selfcare-ui-hpa
  namespace: billing-selfcare
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: selfcare-ui
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
