apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfcare-gateway
  namespace: billing-selfcare
  labels:
    app: selfcare-gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: selfcare-gateway
  template:
    metadata:
      labels:
        app: selfcare-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
      - name: gateway
        image: grimid86/cgrates-ui:selfcare-gateway-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: GATEWAY_TYPE
          value: "selfcare"
        - name: ENVIRONMENT
          value: "production"
        - name: DB_MAX_CONNS
          value: "25"
        - name: RATE_LIMIT_SELFCARE_RPM
          value: "30"
        envFrom:
        - secretRef:
            name: selfcare-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfcare-ui
  namespace: billing-selfcare
  labels:
    app: selfcare-ui
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: selfcare-ui
  template:
    metadata:
      labels:
        app: selfcare-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
      - name: nginx
        image: grimid86/cgrates-ui:selfcare-ui-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
