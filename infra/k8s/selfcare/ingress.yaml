apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: selfcare-ingress
  namespace: billing-selfcare
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "30"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - my.billing.company.com
    secretName: selfcare-tls
  rules:
  - host: my.billing.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: selfcare-ui
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: selfcare-gateway
            port:
              number: 8080
