apiVersion: v1
kind: Service
metadata:
  name: selfcare-gateway
  namespace: billing-selfcare
spec:
  type: ClusterIP
  selector:
    app: selfcare-gateway
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: selfcare-ui
  namespace: billing-selfcare
spec:
  type: ClusterIP
  selector:
    app: selfcare-ui
  ports:
  - port: 80
    targetPort: 80
    name: http
