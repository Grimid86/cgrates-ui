apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-gateway-pdb
  namespace: billing-admin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-ui-pdb
  namespace: billing-admin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-ui
