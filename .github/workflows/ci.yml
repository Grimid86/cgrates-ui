name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: grimid86/cgrates-ui

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./backend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uibill_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run migrations
        run: |
          go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path database/migrations -database "postgres://postgres:postgres@localhost:5432/uibill_test?sslmode=disable" up
      - name: Run tests
        working-directory: ./backend
        run: go test ./... -race -coverprofile=coverage.out
        env:
          DB_DSN: postgres://postgres:postgres@localhost:5432/uibill_test?sslmode=disable
          REDIS_URL: localhost:6379

  build-gateways:
    name: Build Gateways
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    strategy:
      matrix:
        gateway: [selfcare, operator, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.gateway }} gateway
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags='-w -s' -o ../bin/${{ matrix.gateway }}-gateway ./${{ matrix.gateway }}-gateway/cmd/main.go
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gateway }}-gateway
          path: bin/${{ matrix.gateway }}-gateway

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        portal: [selfcare-ui, operator-ui, admin-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.portal }}/package-lock.json
      - name: Install dependencies
        working-directory: frontend/${{ matrix.portal }}
        run: npm ci
      - name: Build
        working-directory: frontend/${{ matrix.portal }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.portal }}
          path: frontend/${{ matrix.portal }}/dist

  build-workers:
    name: Build Workers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [audit-consumer, cdr-processor, email-consumer, balance-monitor, cache-invalidator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.worker }}
        working-directory: ./workers/${{ matrix.worker }}
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags='-w -s' -o ../../bin/${{ matrix.worker }} ./cmd/main.go
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.worker }}
          path: bin/${{ matrix.worker }}

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-gateways, build-frontend, build-workers]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Build and push images
        run: |
          for svc in selfcare-gateway operator-gateway admin-gateway selfcare-ui operator-ui admin-ui; do
            docker build -f infra/docker/Dockerfile.${svc} -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:${svc}-latest .
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:${svc}-latest
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
